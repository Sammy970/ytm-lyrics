<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YT Music Lyrics</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #header {
      background: #16213e;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #header-actions {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .header-btn {
      background: none;
      border: 1px solid #334;
      color: #a0c4ff;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    .header-btn:hover { background: rgba(160,196,255,0.1); }
    .header-btn.active { background: rgba(160,196,255,0.2); border-color: #a0c4ff; }

    #track-info {
      overflow: hidden;
    }

    #track-title {
      font-size: 13px;
      font-weight: bold;
      color: #a0c4ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #track-artist {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #lyrics-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      scroll-behavior: smooth;
    }

    #lyrics-body p {
      margin: 5px 0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 15px;
      line-height: 1.6;
      color: #555;
      transition: color 0.2s, font-size 0.2s, background 0.2s;
      cursor: pointer;
    }

    .translation {
      font-size: 12px;
      color: #6a8faf;
      font-style: italic;
      margin-top: 1px;
      display: block;
    }

    #lyrics-body p.active {
      color: #ffffff;
      font-size: 17px;
      font-weight: bold;
      background: rgba(160, 196, 255, 0.12);
    }

    #lyrics-body p.past {
      color: #444;
    }

    #status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-style: italic;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="track-info">
      <div id="track-title">YT Music Lyrics</div>
      <div id="track-artist"></div>
    </div>
    <div id="header-actions">
    </div>
  </div>
  <div id="lyrics-body" style="display:none"></div>
  <div id="status">Waiting for a song to play…</div>
  <script src="lyrics-window.js"></script>
</body>
</html>
