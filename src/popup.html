<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Music Lyrics</title>
  <style>
    body {
      font-family: sans-serif;
      width: 240px;
      padding: 12px;
      margin: 0;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    #track-info { font-size: 14px; margin-bottom: 8px; }
    #track-info .title { font-weight: bold; }
    #track-info .artist { color: #aaa; font-size: 12px; }
    #status-msg { font-size: 12px; color: #f0a030; min-height: 16px; margin-bottom: 10px; }
    #toggle-btn {
      width: 100%; padding: 8px; background: #ff0000;
      color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
      margin-bottom: 6px;
    }
    #toggle-btn:hover { background: #cc0000; }
    #window-btn {
      width: 100%; padding: 8px; background: #0f3460;
      color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
      margin-bottom: 10px;
    }
    #window-btn:hover { background: #16213e; }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: #ccc; padding: 4px 0;
      border-top: 1px solid #2a2a2a;
      padding-top: 10px;
    }
    .shortcut-hint {
      font-size: 11px; color: #666; margin-top: 6px; text-align: center; margin-bottom: 15px;
    }
    .shortcut-hint kbd {
      background: #2a2a2a; border: 1px solid #444; border-radius: 3px;
      padding: 1px 5px; font-family: monospace; font-size: 11px; color: #aaa;
    }
    .setting-row span { line-height: 1.3; }
    /* Toggle switch */
    .switch { position:relative; width:36px; height:20px; flex-shrink:0; }
    .switch input { opacity:0; width:0; height:0; }
    .slider {
      position:absolute; inset:0; background:#444; border-radius:20px;
      cursor:pointer; transition:background 0.2s;
    }
    .slider:before {
      content:""; position:absolute; width:14px; height:14px;
      left:3px; top:3px; background:#fff; border-radius:50%;
      transition:transform 0.2s;
    }
    input:checked + .slider { background:#0f3460; }
    input:checked + .slider:before { transform:translateX(16px); }
  </style>
</head>
<body>
  <div id="track-info">
    <div class="title" id="track-title">No song playing</div>
    <div class="artist" id="track-artist"></div>
  </div>
  <div id="status-msg"></div>
  <button id="toggle-btn">Toggle Lyrics Overlay</button>
  <button id="window-btn">Open Floating Lyrics (PiP)</button>
  <div class="shortcut-hint" id="shortcut-hint"></div>
  <div class="setting-row">
    <span>Karaoke fill effect</span>
    <label class="switch">
      <input type="checkbox" id="karaoke-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>
  <div class="setting-row">
    <span>Lyrics blur effect</span>
    <label class="switch">
      <input type="checkbox" id="blur-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
